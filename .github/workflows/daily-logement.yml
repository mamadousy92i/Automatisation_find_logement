name: Daily Laval Housing Email

on:
  schedule:
    - cron: "7 8 * * *"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      CITY_QUERY: ${{ secrets.CITY_QUERY }}
      CITY_POSTAL_CODE: ${{ secrets.CITY_POSTAL_CODE }}
      MAX_RESULTS: ${{ secrets.MAX_RESULTS }}
      INCLUDE_PARKING: ${{ secrets.INCLUDE_PARKING }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        run: |
          for key in RECIPIENT_EMAIL CITY_QUERY CITY_POSTAL_CODE MAX_RESULTS INCLUDE_PARKING SMTP_HOST SMTP_PORT SMTP_USERNAME SMTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Run housing bot with one retry
        run: |
          python logement_bot.py || {
            echo "First attempt failed, retrying in 30 seconds..."
            sleep 30
            python logement_bot.py
          }
